version: '3.9'

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: lokai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"           # Expose so Compass can connect too
    volumes:
      - mongo_data:/data/db     # Persists data across restarts
    networks:
      - lokai_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lokai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=lokai_db
      - SECRET_KEY=change-me-in-production-minimum-32-chars-long!!
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ML_API_BASE_URL=http://host.docker.internal:8001
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE=10485760
    volumes:
      - ./uploads:/app/uploads   # Persists uploaded files
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - lokai_network

volumes:
  mongo_data:
    name: lokai_mongo_data

networks:
  lokai_network:
    name: lokai_network
    driver: bridge